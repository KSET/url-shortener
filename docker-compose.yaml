version: '3.8'

services:
  db:
      image: postgres:15
      restart: always
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - internal

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "DomainName=skrati.kset.org"
      - "traefik.http.services.skrati-web.loadbalancer.server.port=8000"
    networks:
      - internal
      - traefik_network

networks:
  internal:
  traefik_network:
    external: true

volumes:
  postgres_data: