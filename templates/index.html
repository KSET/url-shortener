<!DOCTYPE html>
<html lang="hr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Skrati.me</title>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">Skrati URL</h1>
        <form action="/shorten" method="POST" class="space-y-4">
            <input type="url" name="url" placeholder="Zalijepi link ovdje..." required class="w-full p-3 border rounded">
            <button class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700">Skrati</button>
        </form>
        {% if short_url %}
        <div class="mt-6 p-4 bg-green-100 rounded text-center">
            <p class="text-sm">Tvoj link:</p>
            <a href="{{ short_url }}" class="font-bold text-blue-600">{{ short_url }}</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
