<!DOCTYPE html>
<html lang="hr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Skrati.me - Dashboard</title>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-600">Skrati URL</h1>
            <a href="/logout" class="text-xs text-red-500 hover:underline">Odjava ({{ user.email }})</a>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-100 border-l-4 border-red-500 text-red-700 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form action="/shorten" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Dugi URL</label>
                <input type="url" name="url" placeholder="https://neka-jako-duga-adresa.com/..." required 
                       class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Prilagođeni završetak (opcionalno)</label>
                <div class="flex items-center border rounded focus-within:ring-2 focus-within:ring-blue-500">
                    <span class="bg-gray-100 p-3 text-gray-500 border-r text-sm">skrati.kset.org/</span>
                    <input type="text" name="custom_id" placeholder="moj-link" 
                           class="w-full p-3 outline-none rounded-r text-sm">
                </div>
                <p class="text-[10px] text-gray-400 mt-1">Dopuštena slova, brojke i crtice.</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">
                Skrati
            </button>
        </form>

        {% if short_url %}
        <div class="mt-6 p-4 bg-green-100 rounded text-center border border-green-200">
            <p class="text-sm text-green-800">Tvoj skraćeni link:</p>
            <a href="{{ short_url }}" target="_blank" class="font-bold text-blue-600 break-all hover:underline">
                {{ short_url }}
            </a>
        </div>
        {% endif %}
    </div>
</body>
</html>
